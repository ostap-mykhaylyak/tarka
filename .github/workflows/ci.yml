name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: gofmt
        run: test -z "$(gofmt -s -l .)"
      - name: go vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -count=1

  build:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false
      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags '-s -w' -o bin/tarka-${{ matrix.goarch }} ./cmd/tarka
