# tarka - authoritative DNS server, global configuration.
#
# Read at startup and hot-reloaded on change; never rewritten by the
# daemon. Every field has a production default: a sparse (or empty)
# file is fine. Zones are NOT defined here: one YAML file per zone
# lives under /etc/tarka/zones/ (see example.com.yaml.example).

server:
  # Addresses to listen on: each one gets a UDP and a TCP listener.
  # ":53" is the dual-stack wildcard (IPv4 + IPv6). Bind specific IPs
  # when :53 is shared with a local resolver (e.g. systemd-resolved on
  # 127.0.0.53): ["203.0.113.10:53", "[2001:db8::10]:53"].
  # Changing this requires a restart (listeners are bound at startup).
  listen: [":53"]

  # EDNS0 UDP payload size advertised to clients (RFC 6891). Answers
  # larger than the negotiated limit are truncated (TC bit) and the
  # client retries over TCP. 1232 is the DNS-flag-day-2020 safe value.
  udp_payload_size: 1232

  # Read/write timeout for TCP connections (queries and zone
  # transfers). Changing this requires a restart. e.g. "10s"
  tcp_timeout: 10s

  # NSID (RFC 5001): the name this server reports when a query asks
  # "who answered?" (dig +nsid). Handy to tell the three servers
  # apart. Empty = the machine hostname.
  identity: ""

zones:
  # Directory with one YAML file per zone (hot-reloaded; an invalid
  # file is skipped with a warning and its last good version stays
  # loaded).
  dir: /etc/tarka/zones

catalog:
  # Catalog zones (RFC 9432): zero-config secondaries.
  # PRIMARY side: with auto_secondaries the slaves are DISCOVERED from
  # the zones themselves — the glue IPs of every apex NS record (minus
  # this machine's own addresses) may transfer everything, get NOTIFY
  # for everything and receive the catalog listing all hosted zones.
  # Two NS names pointing at this same server simply yield no
  # secondaries. `secondaries` adds extra slaves explicitly.
  # SECONDARY side: set `primaries` to the master(s) — every zone in
  # their catalog is provisioned automatically, no zone files at all.
  # Entries are IP or IP:port; both sides must agree on the zone name.
  zone: catalog.tarka.
  auto_secondaries: true
  secondaries: []            # primary side, extra slaves, e.g. [203.0.113.2]
  primaries: []              # secondary side, e.g. [198.51.100.1]

tsig:
  # Shared transaction key (RFC 8945) authenticating zone transfers and
  # NOTIFY across the cluster. One key for the whole deployment: put the
  # SAME block on the primary and every secondary. Generate a secret
  # with e.g. `tsig-keygen` or `openssl rand -base64 32`. Empty = off
  # (transfers gated by IP ACL only). Enabling requires a restart.
  name: ""                   # any label, must match on both ends
  algorithm: hmac-sha256     # hmac-sha256 | hmac-sha512 | hmac-sha1
  secret: ""                 # base64 HMAC key
  require: false             # refuse unsigned AXFR even from allowed IPs

rrl:
  # Response Rate Limiting: the standard defense against being used as
  # a DNS amplification reflector. Only UDP is limited (TCP is not
  # spoofable). Over the per-subnet cap a response is dropped, or —
  # every slip-th time — sent truncated so a real client retries over
  # TCP. Enabling requires a restart.
  enabled: false
  responses_per_second: 15
  window: 15s
  slip: 2                    # 0 = drop all, 1 = truncate all, N = truncate every Nth
  ipv4_prefix: 24            # clients aggregated into subnets of this size
  ipv6_prefix: 56

alias:
  # ALIAS/ANAME flattening: an ALIAS record (usable at the apex, where
  # CNAME is forbidden) is resolved to the target's A/AAAA and served
  # as local records, refreshed in the background and re-transferred to
  # the secondaries on change.
  resolvers: ["1.1.1.1:53", "8.8.8.8:53"]
  refresh: 5m
  ttl: 5m

geoip:
  # MaxMind GeoLite2 country database, used by the geo: field of zone
  # records (GeoDNS). Install geoipupdate to keep it fresh; tarka
  # hot-swaps the file when it changes. A missing database is not
  # fatal: geo records simply never match and the defaults answer.
  enabled: false
  country_db: /usr/share/GeoIP/GeoLite2-Country.mmdb

# Resolver-IP views (the view: record tag) are configured in a
# separate hot-reloaded file, /etc/tarka/views.yaml — a map of
# provider name -> resolver IP ranges. See views.yaml.example. It
# complements GeoDNS: a record answers on geo OR view match.

acme:
  # Built-in ACME client, fully automatic: EVERY hosted primary zone
  # gets a certificate for <zone> + *.<zone>, obtained and renewed by
  # tarka itself (it answers its own DNS-01 challenges). There is no
  # domain list to maintain: add a zone file, get a certificate.
  # Before contacting the CA, tarka verifies through the resolvers
  # below that the zone's delegation actually points here; a zone
  # that does not (yet) is silently skipped — no failures, no CA
  # rate-limit burn. Certificates land in
  # <cert_dir>/live/<zone>/fullchain.pem + privkey.pem (certbot-style
  # layout): point the reverse proxy there. Enabling requires a
  # restart.
  enabled: false
  email: ""                  # required: CA account contact
  # letsencrypt | letsencrypt-staging | zerossl | any directory URL.
  # Test with letsencrypt-staging first: production has rate limits.
  directory: letsencrypt
  # ZeroSSL (and some other CAs) require EAB credentials from their
  # dashboard:
  #eab: {kid: "", hmac: ""}
  cert_dir: /var/log/tarka/certs
  renew_before: 30d          # renew when less than this remains
  propagation_wait: 30s      # pause before the CA validates (lets
                             # NOTIFY reach the secondaries)
  # Public recursive resolvers used for the delegation check.
  resolvers: ["1.1.1.1:53", "8.8.8.8:53"]
